---
flavor: pdfa
owner: PDF Association Inc.
base-flavor: ribose
base-override:
  filename-attributes:
    copyright-notice: copyright.adoc
    i18n-dictionary: i18n.yaml
    publisher-logo: pdfa-logo.svg
    htmlcoverpage: htmlcoverpage.html
    htmlstylesheet-override: htmlstylesheet-override.scss
    pdf-stylesheet-override: pdfa.xsl
    # relaton-render-config: relaton-render-config.yaml
  value-attributes:
    publisher: PDF Association
    publisher_abbr: PDF Association
    presentation-metadata-color-secondary: '#d03f4e'  # PDFa logo red - good contrast for WCAG Level AA
    presentation-metadata-backcover-text: https://pdfa.org
    body-font: "'Source Sans 3', 'Helvetica Neue', Helvetica, sans-serif"
    header-font: "'Source Sans 3', 'Helvetica Neue', Helvetica, sans-serif"
    monospace-font: "'Noto Sans Mono', Courier, monospace"
    fonts: Source Sans 3;Source Sans 3 SemiBold;Source Sans Pro
    output-extensions: xml,html,pdf
    toclevels-html: 6
    docidentifier: '{{ doctype_abbr }}-{{ docnumeric | prepend: "000" | slice: -3,3 }} {% if draft %}v{{ draft }}{% endif %} {% if edition %}ed. {{ edition }}{% endif %}'
doctypes:
- taste: specification # Specification # The name goes into i18n.yaml
  base: standard
  abbrev: SPEC
  override-attributes:
  - presentation-metadata-color-secondary: '#4891af' # PDFa logo blue - insufficient contrast for WCAG Level AA
- taste: application-note # Application Note
  base: report
  abbrev: AN
  override-attributes:
  - presentation-metadata-color-secondary: '#ca9831' # PDFa logo yellow - insufficient contrast for WCAG Level AA
- taste: technical-note # Technical Note
  base: report
  abbrev: TN
  override-attributes:
  - presentation-metadata-color-secondary: '#ca9831' # PDFa logo yellow - insufficient contrast for WCAG Level AA
- taste: best-practice-guide # Best Practice Guide
  base: report
  abbrev: BPG
  override-attributes:
  - presentation-metadata-color-secondary: '#4891af' # PDFa logo blue - insufficient contrast for WCAG Level AA
stages:
  - taste: draft
    base: draft
    abbrev: DRAFT
  - taste: release-candidate
    base: draft
    abbrev: RC
  - taste: published
    base: published
    default: true
    published: true
